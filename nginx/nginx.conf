events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4000;
    }

    # ─────────────────────────────────────────────
    # Bloque común: rutas REST + frontend SPA + HMR.
    # Lo definimos como mapas para reusarlo en HTTP y HTTPS.
    # ─────────────────────────────────────────────
    server_tokens off;

    # Si la conexión es WS upgrade dejamos pasar, sino vacío.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─────────────────────────────────────────────
    # HTTP (puerto 80) — redirige todo a HTTPS.
    # Para evitar warnings de cookie secure y permitir el scanner (que requiere
    # contexto seguro), forzamos HTTPS.
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────
    # HTTPS (puerto 443) — self-signed cert para uso on-premise en LAN.
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 15M;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # ── Backend (REST, auth OAuth, uploads, health) ─────────────────────
        location ~ ^/(api|auth|uploads|health)(/|$) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_read_timeout 90s;
        }

        # ── Vite HMR WebSocket ────────────────────────────────────────────────
        location /_vite/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
        }

        # ── Todo lo demás → Frontend (Vite dev server + HMR) ─────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_cache_bypass          $http_upgrade;
        }
    }
}
