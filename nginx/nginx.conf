events {
    worker_connections 1024;
}

http {
    # ─────────────────────────────────────────────
    # Upstream services
    # ─────────────────────────────────────────────
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:4000;
    }

    # ─────────────────────────────────────────────
    # Servidor principal
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Tamaño máximo de upload (para actas/evidencias)
        client_max_body_size 15M;

        # Logs
        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        # ── API → Backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # ── Auth + endpoints REST → Backend
        location ~ ^/(auth|users|departments|locations|asset-categories|audit|assets|tickets|actas|notifications|health)(/|$) {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend → Vite dev server (con HMR)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Vite HMR WebSocket
        location /_vite/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
